# AI 配置
# 密钥从环境变量读取：KB_AI_KEY

provider: deepseek  # deepseek | claude | openai
models:
  summarize: deepseek-chat
  tag: deepseek-chat
  link_suggest: deepseek-chat

# 可按需切换，例如：
# provider: openai
# models:
#   summarize: gpt-4o
#   tag: gpt-4o-mini
#   link_suggest: gpt-4o

# provider: claude
# models:
#   summarize: claude-sonnet-4-20250514
#   tag: claude-haiku-4-20250414
#   link_suggest: claude-sonnet-4-20250514

prompts:
  summarize: "为以下笔记生成一句话中文摘要，只返回摘要文本："
  tag: "为以下笔记建议3-5个标签，用英文小写kebab-case，逗号分隔，只返回标签："
  link_suggest: "分析以下笔记，建议可能相关的其他主题（用于创建双向链接），每行一个："
